version: '3.8'

services:
  db:
    image: postgres:15
    container_name: bd_impresion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: bd_impresion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_nueva:/var/lib/postgresql/data

volumes:
  postgres_data_nueva: